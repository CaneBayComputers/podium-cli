<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" role="img" aria-label="Podium logo">
  <title>Podium</title>
  <defs>
    <linearGradient id="podiumGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="35%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>

  <g transform="translate(19, 2)">
    <!-- P outline: vertical bar + top + bowl -->
    <path d="M 14 122 L 14 14 L 60 14 A 28 28 0 0 1 60 70 L 14 70"
          stroke="url(#podiumGrad)"
          stroke-width="17"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <!-- chevron > cursor inside the bowl -->
    <path d="M 31 27 L 57 42 L 31 57"
          stroke="url(#podiumGrad)"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>
</svg>
