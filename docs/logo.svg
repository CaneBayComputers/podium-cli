<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Podium logo">
  <title>Podium</title>
  <defs>
    <linearGradient id="hexFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162047"/>
      <stop offset="100%" stop-color="#070d1f"/>
    </linearGradient>
    <linearGradient id="hexEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="pStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagonal frame, pointy-top -->
  <path d="M 100 14 L 174 56 L 174 144 L 100 186 L 26 144 L 26 56 Z"
        fill="url(#hexFill)"
        stroke="url(#hexEdge)"
        stroke-width="3.5"
        stroke-linejoin="round"/>

  <!-- Inner thin accent ring -->
  <path d="M 100 26 L 164 62 L 164 138 L 100 174 L 36 138 L 36 62 Z"
        fill="none"
        stroke="#1e40af"
        stroke-width="1"
        stroke-opacity="0.55"
        stroke-linejoin="round"/>

  <!-- The P -->
  <g filter="url(#glow)">
    <path d="M 72 158 L 72 56 L 118 56 A 28 28 0 0 1 118 112 L 72 112"
          stroke="url(#pStroke)"
          stroke-width="14"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <!-- Chevron cursor inside the bowl -->
    <path d="M 87 70 L 107 84 L 87 98"
          stroke="#67e8f9"
          stroke-width="6.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>
</svg>
