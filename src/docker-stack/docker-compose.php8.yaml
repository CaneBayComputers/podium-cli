services:
  server:
    image: canebaycomputers/cbc:nginx-php8
    container_name: CONTAINER_NAME
    ports:
      - "PROJECT_PORT:80"
    volumes:
      - .:/usr/share/nginx/htmlPUBLIC
      - /etc/hosts:/etc/hosts:ro
    networks:
      default:
        ipv4_address: IPV4_ADDRESS

networks:
  default:
    external: true
    name: podium-cli_vpc
