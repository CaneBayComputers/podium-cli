services:
  mysql:
    image: mariadb
    container_name: "${MARIADB_CONTAINER_NAME:-podium-mariadb}"
    environment:
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    expose:
      - "3306"
    networks:
      vpc:
        ipv4_address: "${VPC_SUBNET}.2"

  phpmyadmin:
    image: phpmyadmin
    container_name: "${PHPMYADMIN_CONTAINER_NAME:-podium-phpmyadmin}"
    restart: always
    environment:
      PMA_HOST: "${VPC_SUBNET}.2"
      PMA_USER: root
      UPLOAD_LIMIT: 256M
    networks:
      vpc:
        ipv4_address: "${VPC_SUBNET}.3"

  redis:
    image: redis
    container_name: "${REDIS_CONTAINER_NAME:-podium-redis}"
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      vpc:
        ipv4_address: "${VPC_SUBNET}.5"

  memcached:
    image: memcached
    container_name: "${MEMCACHED_CONTAINER_NAME:-podium-memcached}"
    restart: always
    expose:
      - "11211"
    networks:
      vpc:
        ipv4_address: "${VPC_SUBNET}.7"

  mongo:
    image: mongo
    container_name: "${MONGO_CONTAINER_NAME:-podium-mongo}"
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    networks:
      vpc:
        ipv4_address: "${VPC_SUBNET}.4"

  postgres:
    image: postgres
    container_name: "${POSTGRES_CONTAINER_NAME:-podium-postgres}"
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      vpc:
        ipv4_address: "${VPC_SUBNET}.6"

  mailhog:
    image: axllent/mailpit:latest
    container_name: "${MAILHOG_CONTAINER_NAME:-podium-mailhog}"
    restart: always
    ports:
      - "8025:8025"
    expose:
      - "1025"
    networks:
      vpc:
        ipv4_address: "${VPC_SUBNET}.8"

volumes:
  redis_data:
  mysql_data:
  mongo_data:
  postgres_data:

networks:
  vpc:
    driver: bridge
    ipam:
      config:
        - subnet: "${VPC_SUBNET}.0/24"
